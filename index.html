<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Police Speedometer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="speedo-container">
        <div class="speedo-dial engine-off">
            
            <div class="lspd-logo-bg"></div>

            <div class="marks">
                <span class="mark m0">0</span>
                <span class="mark m20">20</span>
                <span class="mark m40">40</span>
                <span class="mark m60">60</span>
                <span class="mark m80">80</span>
                <span class="mark m100">100</span>
                <span class="mark m120">120</span>
                <span class="mark m140">140</span>
                <span class="mark m160">160</span>
            </div>

            <div class="needle-container" id="needle">
                <div class="needle-hand"></div>
            </div>

            <div class="needle-center"></div>

            <div class="digital-hud">
                
                <div class="top-icons">
                    <span class="icon" id="icon-ind-l">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
                        </svg>
                    </span>
                    <span class="icon" id="icon-seatbelt">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                            <path d="M12.5,2C10.5,2 9,3.5 9,5.5C9,7.5 10.5,9 12.5,9C14.5,9 16,7.5 16,5.5C16,3.5 14.5,2 12.5,2M10.5,10L9,11.5L6.5,9L5,10.5L8.5,14L7.5,15C7.2,15.3 7,15.8 7,16.2V22H9V17L12.5,13.5L16.5,20.5L18.5,19.5L14.5,12.5C14.2,12 13.6,11.6 13,11.5L10.5,10M17.5,10L14.5,15.5L12.5,12L14.5,8L17.5,10Z"/>
                        </svg>
                    </span>
                    <span class="icon" id="icon-lights">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M15,15.5V8.5C15,7.12 13.88,6 12.5,6H5C3.9,6 3,6.9 3,8V16C3,17.1 3.9,18 5,18H12.5C13.88,18 15,16.88 15,15.5M7,8A1,1 0 0,1 8,9A1,1 0 0,1 7,10A1,1 0 0,1 6,9A1,1 0 0,1 7,8M7,12A1,1 0 0,1 8,13A1,1 0 0,1 7,14A1,1 0 0,1 6,13A1,1 0 0,1 7,12M22,7.31L18.4,10.9L16.96,9.5L20.55,5.9L22,7.31M22,11.31L18.4,14.9L16.96,13.5L20.55,9.9L22,11.31M22,15.31L18.4,18.9L16.96,17.5L20.55,13.9L22,15.31Z"/>
                        </svg>
                    </span>
                    <span class="icon" id="icon-ind-r">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" />
                        </svg>
                    </span>
                </div>

                <div class="main-digital">
                    <span id="digital-speed">0</span>
                    <div class="sub-info">
                        <span id="speed-unit">KMH</span>
                        <span id="gear">N</span>
                    </div>
                    <div class="rpm-bg"><div class="rpm-fill" id="rpm-bar"></div></div>
                </div>

                <div class="bottom-status">
                    <div class="bar-group fuel-group">
                        <span class="label">FUEL</span>
                        <div class="bar-stack">
                            <div class="bar-bg"><div class="bar-fill" id="fuel-bar"></div></div>
                            <span class="bar-val" id="fuel-val">0%</span>
                        </div>
                    </div>
                    <div class="bar-group health-group">
                        <div class="bar-stack">
                            <div class="bar-bg"><div class="bar-fill health" id="health-bar"></div></div>
                            <span class="bar-val" id="health-val">0%</span>
                        </div>
                        <span class="label">HP</span>
                    </div>
                </div>
                
                <div class="odo-text" id="odometer">0.0 mi</div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
